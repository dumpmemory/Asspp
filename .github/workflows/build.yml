name: Build App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          for XCODE_APP in \
            /Applications/Xcode_26.2.app \
            /Applications/Xcode_26.1.app \
            /Applications/Xcode_26.0.app \
            /Applications/Xcode.app
          do
            if [ -d "${XCODE_APP}" ]; then
              sudo xcode-select -s "${XCODE_APP}"
              break
            fi
          done
          xcodebuild -version

      - name: Ensure iOS platform is installed
        run: xcodebuild -downloadPlatform iOS || true

      - name: Install Procursus
        uses: dhinakg/procursus-action@main
        with:
          packages: ldid findutils sed coreutils make

      - name: Build
        run: |
          chmod +x Resources/Scripts/compile.release.mobile.ci.sh
          ./Resources/Scripts/compile.release.mobile.ci.sh "$(pwd)" "$(pwd)/Asspp.ipa"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Asspp.ipa
          path: Asspp.ipa

  build-osx:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          for XCODE_APP in \
            /Applications/Xcode_26.2.app \
            /Applications/Xcode_26.1.app \
            /Applications/Xcode_26.0.app \
            /Applications/Xcode.app
          do
            if [ -d "${XCODE_APP}" ]; then
              sudo xcode-select -s "${XCODE_APP}"
              break
            fi
          done
          xcodebuild -version

      - name: Install Procursus
        uses: dhinakg/procursus-action@main
        with:
          packages: ldid findutils sed coreutils make

      - name: Build
        run: |
          chmod +x Resources/Scripts/compile.release.osx.sh
          ./Resources/Scripts/compile.release.osx.sh "$(pwd)" "$(pwd)/Asspp.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Asspp.zip
          path: Asspp.zip
